<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Очки-переводчик с кошачьего</title>
    <style>
        /* Простые и понятные стили */
        body {
            font-family: sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .main-block {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #ff4757;
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 20px 0;
        }

        .steps-list {
            text-align: left;
            background: #f1f2f6;
            padding: 20px 20px 20px 40px;
            border-radius: 8px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            background-color: #2ed573;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background-color: #26af5f;
        }
    </style>
</head>
<body>

    <!-- Главный блок сайта -->
    <div class="main-block">
        <h1>Очки MeowLens</h1>
        <p>Простое устройство, чтобы наконец-то понять, чего хочет ваш кот.</p>
        
        <!-- Сюда встанет ваша картинка из нейросети -->
        <img src="https://unsplash.com" alt="Кот">

        <h3>Как это работает:</h3>
        <ol class="steps-list">
            <li>Надеваете очки на себя.</li>
            <li>Смотрите на кота, когда он мяукает.</li>
            <li>На стекле очков появляется текст на русском языке.</li>
        </ol>

        <h3>Оставить заявку:</h3>
        <form onsubmit="alert('Заявка принята!'); return false;">
            <input type="text" placeholder="Ваше имя" required>
            <input type="email" placeholder="Ваш Email" required>
            
            <select>
                <option>У меня обычный кот</option>
                <option>У меня породистый кот</option>
                <option>У меня вредный кот</option>
            </select>
            
            <button type="submit">Купить очки</button>
        </form>
    </div>

</body>
</html>
